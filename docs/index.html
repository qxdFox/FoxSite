<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entity Client</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="econ.ico" type="image/x-icon">
    <meta name="description" content="Download Entity Client, an improvement to the standard DDNet client.">
    <meta name="theme-color" content="#2566a0">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.entityclient.net/">
    <meta property="og:site_name" content="Entity Client">
    <meta property="og:title" content="Entity Client | Downloads and Changelog">
    <meta property="og:description" content="Download Entity Client, an improvement to the standard DDNet client.">
    <!--
    <meta property="og:image" content="https://www.entityclient.net/assets/gui_logo.png">
    <meta property="og:image:alt" content="Entity Client logo">
    -->

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Entity Client | Downloads and Changelog">
    <meta name="twitter:description" content="Download Entity Client, an improvement to the standard DDNet client.">
    <!--
    <meta name="twitter:image" content="https://www.entityclient.net/assets/gui_logo.png">
    <meta name="twitter:image:alt" content="Entity Client logo">
    -->
</head>
<body>
    <div class="floating-ghosts" id="floating-ghosts"></div>

    <header class="hero-section">
        <img src="assets/gui_logo.svg" alt="Entity Client Logo" class="center-logo">
    </header>

    <main class="main-content">
        <div class="download-box">
            <div class="download-header">
                <h2>Download Now</h2>
                <p id="os-display">Detecting your OS...</p>
            </div>
            <button id="download-button">Download for <span id="os-name"></span></button>
            <a href="https://github.com/qxdFox/Entity-Client/releases" target="_blank" rel="noopener noreferrer" class="not-your-os">Not your OS? View all releases</a>
        </div>

        <section class="changelog-box" aria-labelledby="changelog-title">
            <div class="changelog-header">
                <h3 id="changelog-title">Latest Changelog</h3>
                <a id="changelog-release-link" href="https://github.com/FoxNet-DDNet/Entity-Client-DDNet/releases" target="_blank" rel="noopener noreferrer">View on GitHub</a>
            </div>
            <p id="changelog-meta">Loading latest release notes...</p>
            <div id="changelog-content" class="changelog-content"></div>
            <button id="changelog-toggle" class="changelog-toggle" type="button" hidden>Show more releases</button>
        </section>
    </main>

    <footer class="footer">
        <p>Website made by Tide</p>
        <p>© Entity Client.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
